version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: wallet_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - wallet_network

  nginx:
    image: nginx:latest
    container_name: wallet_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - wallet_network

  db:
    image: mysql:8.0
    container_name: wallet_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wallet_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306" 
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - wallet_network

networks:
  wallet_network:

volumes:
  dbdata: